<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineSearch — Movie Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b10;
      --surface: #0f1318;
      --card: #141920;
      --border: #ffffff0d;
      --accent: #f5c842;
      --accent2: #e05c3a;
      --text: #edeae0;
      --muted: #6b6860;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* HEADER */
    header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo-wrap { line-height: 1; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      letter-spacing: 0.04em;
      background: linear-gradient(130deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }

    /* SEARCH */
    .search-section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
    }

    .search-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .search-box:focus-within { border-color: #f5c84240; }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-box button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      padding: 0 1.6rem;
      cursor: pointer;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: #080b10;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover { opacity: 0.85; }

    .filters {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .filter-label {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-right: 0.25rem;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.35rem 0.9rem;
      border-radius: 99px;
      font-size: 0.8rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #f5c84210;
    }

    /* YEAR FILTER */
    .year-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.75rem;
      border-radius: 99px;
      font-size: 0.8rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      width: 90px;
      transition: border-color 0.2s;
    }

    .year-input:focus { border-color: var(--accent); }
    .year-input::placeholder { color: var(--muted); }

    /* RESULTS */
    .results-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }

    .results-meta {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: none;
    }

    .results-meta span { color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
      gap: 1.1rem;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
      animation: fadeUp 0.35s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #ffffff18;
      box-shadow: 0 16px 36px #00000055;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    .card-no-img {
      width: 100%;
      aspect-ratio: 2/3;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
    }

    .card-info { padding: 0.7rem; }

    .card-title {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .card-type {
      background: #ffffff08;
      border-radius: 3px;
      padding: 0.1rem 0.35rem;
      text-transform: capitalize;
    }

    /* LOAD MORE */
    .load-more-wrap { text-align: center; margin-top: 2.5rem; }

    #loadMoreBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.7rem 2.2rem;
      border-radius: 99px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }

    #loadMoreBtn:hover { border-color: var(--accent); color: var(--accent); }

    /* EMPTY / SPINNER */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 2.8rem; margin-bottom: 0.8rem; opacity: 0.35; }

    #spinner {
      text-align: center;
      padding: 3.5rem;
      display: none;
    }

    #spinner::after {
      content: '';
      display: inline-block;
      width: 1.8rem;
      height: 1.8rem;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000000a0;
      backdrop-filter: blur(10px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card);
      border: 1px solid #ffffff12;
      border-radius: 14px;
      max-width: 760px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 1.8rem;
      display: flex;
      gap: 1.8rem;
      position: relative;
      transform: scale(0.96);
      transition: transform 0.28s;
    }

    .modal-overlay.open .modal { transform: scale(1); }

    .modal-poster {
      width: 185px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      align-self: flex-start;
    }

    .modal-poster img { width: 100%; display: block; }

    .modal-no-poster {
      width: 185px;
      height: 275px;
      flex-shrink: 0;
      background: var(--surface);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: var(--muted);
    }

    .modal-body { flex: 1; min-width: 0; }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.9rem;
      letter-spacing: 0.04em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.55rem;
      border-radius: 4px;
      background: #ffffff08;
      border: 1px solid var(--border);
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .badge.hl { background: #f5c84212; border-color: #f5c84235; color: var(--accent); }

    .rating {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
      font-size: 1.05rem;
      font-weight: 500;
    }

    .star { color: var(--accent); }

    .plot {
      font-size: 0.88rem;
      line-height: 1.72;
      color: #c0bdb0;
      margin-bottom: 1.1rem;
    }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
    }

    .detail .label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.1rem;
    }

    .detail .val { font-size: 0.8rem; }

    .close-btn {
      position: absolute;
      top: 0.9rem;
      right: 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 1.9rem;
      height: 1.9rem;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .close-btn:hover { color: var(--text); border-color: #ffffff28; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 99px; }

    @media (max-width: 580px) {
      .modal { flex-direction: column; }
      .modal-poster, .modal-no-poster { width: 100%; height: auto; }
      .details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo">CineSearch</div>
    <div class="tagline">Powered by OMDB · Find any movie, series or episode</div>
  </div>
</header>

<div class="search-section">
  <div class="search-row">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movies, series, episodes..." autocomplete="off"/>
      <button onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="filters">
    <span class="filter-label">Type:</span>
    <button class="filter-btn active" onclick="setType('',this)">All</button>
    <button class="filter-btn" onclick="setType('movie',this)">Movie</button>
    <button class="filter-btn" onclick="setType('series',this)">Series</button>
    <button class="filter-btn" onclick="setType('episode',this)">Episode</button>
    <span class="filter-label" style="margin-left:0.5rem">Year:</span>
    <input type="text" class="year-input" id="yearInput" placeholder="e.g. 2023" maxlength="4"/>
  </div>
</div>

<div class="results-wrap">
  <div id="resultsMeta" class="results-meta"></div>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty-state">
    <div class="icon">🎬</div>
    <p>Search for a movie, series or episode to get started.</p>
  </div>
  <div id="spinner"></div>
  <div class="load-more-wrap">
    <button id="loadMoreBtn" onclick="loadMore()">Load More</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modalContent" style="display:contents"></div>
  </div>
</div>

<script>
  const API_KEY = 'eae290f2';
  const BASE = 'https://www.omdbapi.com/';

  let query = '', type = '', year = '', page = 1, total = 0;

  // Restore last search from localStorage
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('lastSearch');
    if (saved) {
      const s = JSON.parse(saved);
      document.getElementById('searchInput').value = s.query || '';
      document.getElementById('yearInput').value = s.year || '';
      if (s.type) {
        type = s.type;
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.toggle('active', b.getAttribute('onclick').includes(`'${s.type}'`));
        });
      }
      if (s.query) doSearch();
    }
  });

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function setType(t, btn) {
    type = t;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (query) doSearch();
  }

  async function doSearch() {
    query = document.getElementById('searchInput').value.trim();
    year = document.getElementById('yearInput').value.trim();
    if (!query) return;

    // Save to localStorage
    localStorage.setItem('lastSearch', JSON.stringify({ query, type, year }));

    page = 1;
    document.getElementById('grid').innerHTML = '';
    document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('resultsMeta').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('spinner').style.display = 'block';

    await fetchResults();
  }

  async function loadMore() {
    page++;
    await fetchResults(true);
  }

  async function fetchResults(append = false) {
    let url = `${BASE}?apikey=${API_KEY}&s=${encodeURIComponent(query)}&page=${page}`;
    if (type) url += `&type=${type}`;
    if (year) url += `&y=${year}`;

    try {
      const res = await fetch(url);
      const data = await res.json();
      document.getElementById('spinner').style.display = 'none';

      if (data.Response === 'True') {
        total = parseInt(data.totalResults);
        renderCards(data.Search, append);
        const meta = document.getElementById('resultsMeta');
        meta.style.display = 'block';
        const shown = document.querySelectorAll('.card').length;
        meta.innerHTML = `Showing <span>${shown}</span> of <span>${total}</span> results for "<span>${query}</span>"`;
        document.getElementById('loadMoreBtn').style.display = (page * 10 < total) ? 'inline-block' : 'none';
      } else {
        if (!append) {
          document.getElementById('emptyState').innerHTML = `<div class="icon">🔍</div><p>No results found for "<strong>${query}</strong>"</p>`;
          document.getElementById('emptyState').style.display = 'block';
        }
      }
    } catch (err) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('emptyState').innerHTML = `<div class="icon">⚠️</div><p>An error occurred. Please try again.</p>`;
      document.getElementById('emptyState').style.display = 'block';
    }
  }

  function renderCards(movies, append) {
    const grid = document.getElementById('grid');
    movies.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${i * 0.04}s`;
      card.onclick = () => openModal(m.imdbID);
      const img = m.Poster !== 'N/A'
        ? `<img src="${m.Poster}" alt="${m.Title}" loading="lazy"/>`
        : `<div class="card-no-img">🎞️</div>`;
      card.innerHTML = `${img}
        <div class="card-info">
          <div class="card-title" title="${m.Title}">${m.Title}</div>
          <div class="card-meta">
            <span>${m.Year}</span>
            <span class="card-type">${m.Type}</span>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  async function openModal(id) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('modalContent').innerHTML = '<div style="padding:2rem;color:var(--muted);grid-column:1/-1">Loading...</div>';

    try {
      const res = await fetch(`${BASE}?apikey=${API_KEY}&i=${id}&plot=full`);
      const m = await res.json();

      const poster = m.Poster !== 'N/A'
        ? `<div class="modal-poster"><img src="${m.Poster}" alt="${m.Title}"/></div>`
        : `<div class="modal-no-poster">🎞️</div>`;

      const genres = (m.Genre || '').split(', ').map(g => `<span class="badge hl">${g}</span>`).join('');
      const rating = m.imdbRating !== 'N/A'
        ? `<div class="rating"><span class="star">★</span>${m.imdbRating}<span style="color:var(--muted);font-size:0.82rem">/10</span></div>` : '';

      document.getElementById('modalContent').innerHTML = `
        ${poster}
        <div class="modal-body">
          <div class="modal-title">${m.Title}</div>
          <div class="badges">
            <span class="badge">${m.Year}</span>
            <span class="badge">${m.Rated || 'NR'}</span>
            <span class="badge">${m.Runtime || 'N/A'}</span>
            ${genres}
          </div>
          ${rating}
          <p class="plot">${m.Plot || 'No description available.'}</p>
          <div class="details">
            <div class="detail"><div class="label">Director</div><div class="val">${m.Director || 'N/A'}</div></div>
            <div class="detail"><div class="label">Writer</div><div class="val">${m.Writer || 'N/A'}</div></div>
            <div class="detail"><div class="label">Actors</div><div class="val">${m.Actors || 'N/A'}</div></div>
            <div class="detail"><div class="label">Language</div><div class="val">${m.Language || 'N/A'}</div></div>
            <div class="detail"><div class="label">Country</div><div class="val">${m.Country || 'N/A'}</div></div>
            <div class="detail"><div class="label">Box Office</div><div class="val">${m.BoxOffice || 'N/A'}</div></div>
          </div>
        </div>`;
    } catch {
      document.getElementById('modalContent').innerHTML = '<div style="padding:2rem;color:var(--muted)">Failed to load details.</div>';
    }
  }

  function closeOverlay(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
